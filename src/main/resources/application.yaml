spring:
  application:
    name: Lista AI

  datasource:
    url: jdbc:postgresql://localhost:5432/lista_ai_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  threads:
    virtual:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:development-secret-key-replace-in-production-must-be-256-bits}
    expiration-seconds: 900
    refresh-expiration-days: 7
  auth:
    google:
      jwks-uri: https://www.googleapis.com/oauth2/v3/certs
      client-id: ${GOOGLE_CLIENT_ID:}
