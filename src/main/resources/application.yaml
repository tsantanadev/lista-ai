spring:
  application:
    name: Lista AI

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lista_ai_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${SHOW_SQL:false}
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  threads:
    virtual:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: 900
    refresh-expiration-days: 7
  auth:
    google:
      jwks-uri: https://www.googleapis.com/oauth2/v3/certs
      client-id: ${GOOGLE_CLIENT_ID:}
  email:
    from-address: ${EMAIL_FROM:noreply@lista-ai.com}
    provider: resend
    resend:
      api-key: ${RESEND_API_KEY:}
      base-url: ${RESEND_BASE_URL:https://api.resend.com}
    worker:
      poll-interval-ms: 10000
  email-verification:
    enabled: ${EMAIL_VERIFICATION_ENABLED:true}
    token-ttl-hours: 24
    resend-cooldown-seconds: 60
    redirect-base-url: ${VERIFICATION_REDIRECT_BASE_URL:https://app.lista-ai.com/verify-email}
