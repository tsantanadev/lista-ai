databaseChangeLog:
  - changeSet:
      id: 006
      author: lista-ai
      changes:
        - createTable:
            tableName: user_shopping_list
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_shopping_list_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: list_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_shopping_list_list
                    references: list(id)
                    deleteCascade: true
              - column:
                  name: role
                  type: TEXT
                  defaultValue: owner
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_shopping_list
            columnNames: user_id, list_id
            constraintName: pk_user_shopping_list
