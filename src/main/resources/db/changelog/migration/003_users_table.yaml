databaseChangeLog:
  - changeSet:
      id: 003
      author: lista-ai
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: TEXT
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueDate: now()
                  constraints:
                    nullable: false
